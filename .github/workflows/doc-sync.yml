name: doc-sync

# Skills that install standalone carry copies of the px-conventions reference files they
# need. This fails the build if a copy's code blocks drift from the canonical source.
on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-doc-sync.mjs
